backend:
  name: git-gateway
  branch: main

media_folder: "src/img/uploads"
public_folder: "/img/uploads"

locale: "fr"

collections:
  - name: "articles"
    label: "Articles"
    folder: "src/articles"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Titre", name: "title", widget: "string" }
      - { label: "Sous-titre", name: "subtitle", widget: "string", required: false }
      - { label: "Date de publication", name: "date", widget: "datetime", format: "YYYY-MM-DD" }
      - { label: "Dernière mise à jour", name: "lastmod", widget: "datetime", format: "YYYY-MM-DD", required: false }
      - label: "Rubrique"
        name: "rubrique"
        widget: "select"
        options:
          - "Portrait de maison"
          - "Territoire"
          - "Décryptage"
          - "Dialogue"
          - "Bibliothèque"
          - "Méthode"
      - label: "Tags"
        name: "tags"
        widget: "list"
        required: false
        field: { label: "Tag", name: "tag", widget: "string" }
      - { label: "Image de couverture", name: "image", widget: "image", required: false }
      - { label: "Slug (URL courte)", name: "slug", widget: "string", required: false, hint: "Ex: maison-galimard. Si vide, généré depuis le titre." }
      - { label: "Description SEO", name: "seoDescription", widget: "text", required: false, hint: "Meta description (150-160 car.). Si vide, l'extrait est utilisé." }
      - { label: "Extrait", name: "excerpt", widget: "text", required: false }
      - { label: "Article à la une", name: "featured", widget: "boolean", default: false }
      - { label: "Gradient début (couleur hex)", name: "gradient", widget: "string", required: false, hint: "Ex: #1B2A4A — couleur de fond si pas d'image" }
      - { label: "Gradient fin (couleur hex)", name: "gradientEnd", widget: "string", required: false, hint: "Ex: #C9A96E" }
      - { label: "Contenu", name: "body", widget: "markdown" }
      - label: "FAQ (rich snippets Google)"
        name: "faq"
        widget: "list"
        required: false
        fields:
          - { label: "Question", name: "question", widget: "string" }
          - { label: "Réponse", name: "answer", widget: "text" }
